<div class="card audit-card" style="margin-bottom: 25px;">
    <span class="card-label" id="auditLabel">NEURAL_AUDIT_REPORT</span>
    <div id="output" class="output-text" style="font-size: 13px; line-height: 1.8;">
        Awaiting audit sequence...
    </div>
    
    <div class="card-group" style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
        <div class="card-stat">
            <span class="card-label">VELOCITY</span>
            <div class="val"><span id="vVal">0</span><span class="unit">%</span></div>
            <div class="bar-bg">
                <div id="bar" class="bar-fill" style="width: 0%;"></div>
            </div>
        </div>
        <div class="card-stat">
            <span class="card-label">INTEGRITY</span>
            <div class="val">99<span class="unit">%</span></div>
            <div style="font-size: 9px; color: var(--dim); margin-top: 10px;">ENCRYPTION_ACTIVE</div>
        </div>
    </div>
</div>
